<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kâr Hesaplama Aracı — Teknobird</title>
<style>
  :root{
    --bg: #f3f3f6;
    --bg-card: #ffffff;
    --bg-card-2: #f6f6f9;
    --border: #e4e4ea;
    --border-soft: #ececf1;
    --accent: #e8352e;
    --accent-dim: #b0221c;
    --accent-glow: rgba(232,53,46,0.20);
    --text: #1c1c22;
    --text-muted: #6b6b76;
    --text-faint: #9a9aa4;
    --success: #16a35f;
    --success-glow: rgba(22,163,95,0.16);
    --danger: #d9382f;
    --mono: 'JetBrains Mono', 'SFMono-Regular', Consolas, 'Courier New', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0; padding:0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }

  body{
    min-height:100vh;
    background-image:
      radial-gradient(circle at 15% 0%, rgba(232,53,46,0.06), transparent 45%),
      radial-gradient(circle at 100% 30%, rgba(232,53,46,0.04), transparent 40%),
      linear-gradient(var(--border-soft) 1px, transparent 1px),
      linear-gradient(90deg, var(--border-soft) 1px, transparent 1px);
    background-size: auto, auto, 34px 34px, 34px 34px;
    background-position: 0 0, 0 0, -1px -1px, -1px -1px;
    padding: 16px 12px; /* Alttaki gereksiz boşluğu önlemek için padding daraltıldı */
  }

  .wrap{
    max-width: 980px;
    margin: 0 auto;
  }

  /* ---- Header ---- */
  .eyebrow{
    display:flex; align-items:center; gap:8px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
  }
  .eyebrow::before{
    content:"";
    width:7px; height:7px;
    background: var(--accent);
    border-radius:50%;
    box-shadow: 0 0 10px var(--accent-glow);
  }

  h1{
    font-size: 24px;
    line-height:1.15;
    margin: 0 0 6px;
    font-weight: 800;
    letter-spacing: -0.01em;
  }
  h1 span{ color: var(--accent); }

  .subtitle{
    color: var(--text-muted);
    font-size: 13px;
    line-height:1.5;
    margin: 0 0 20px;
    max-width: 60ch;
  }

  /* ---- Layout: Yan yana esnek grid ---- */
  .layout{
    display:grid;
    grid-template-columns: 1.1fr 1fr;
    gap: 14px;
    align-items:start;
  }

  /* ---- Tabs ---- */
  .tabs{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 4px;
    padding: 4px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 14px;
  }
  .tab{
    appearance:none; border:none; cursor:pointer;
    background: transparent;
    color: var(--text-muted);
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 600;
    padding: 8px 2px;
    border-radius: 8px;
    line-height:1.3;
    transition: background .18s ease, color .18s ease;
  }
  .tab:hover{ color: var(--text); }
  .tab.active{
    background: var(--accent);
    color: #fff;
    box-shadow: 0 4px 14px var(--accent-glow);
  }

  /* ---- Card ---- */
  .card{
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    box-shadow: 0 1px 2px rgba(20,20,30,0.03);
  }

  .field{
    margin-bottom: 12px;
  }
  .field:last-of-type{ margin-bottom: 0; }
  
  .field label{
    display:flex; justify-content:space-between; align-items:baseline;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .field label .req{ color: var(--accent); margin-left:3px; }
  .field label .hint{
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-faint);
    font-weight: 400;
  }

  .input-shell{
    position:relative;
    display:flex;
    align-items:center;
    background: var(--bg-card-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  .input-shell:focus-within{
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(232,53,46,0.10);
  }
  .input-shell .unit{
    padding: 0 12px;
    color: var(--text-faint);
    font-family: var(--mono);
    font-size: 13px;
    border-left: 1px solid var(--border);
    align-self: stretch;
    display:flex; align-items:center;
  }
  input[type="text"], input[type="number"]{
    flex:1;
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--mono);
    font-size: 15px;
    padding: 10px 12px;
  }
  input::placeholder{ color: var(--text-faint); }

  .btn-row{
    display:flex;
    gap: 8px;
    margin-top: 16px;
  }
  .btn{
    appearance:none; border:none; cursor:pointer;
    font-family: var(--sans);
    font-weight: 700;
    font-size: 13px;
    border-radius: 10px;
    padding: 11px 14px;
    transition: transform .12s ease, filter .12s ease, background .15s ease;
  }
  .btn:active{ transform: scale(0.98); }
  .btn-primary{
    flex:1;
    background: linear-gradient(180deg, #f0453d, var(--accent));
    color:#fff;
    box-shadow: 0 6px 18px var(--accent-glow);
  }
  .btn-primary:hover{ filter:brightness(1.07); }
  .btn-ghost{
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover{ color:var(--text); border-color:#c9c9d2; background: var(--bg-card-2); }

  .error{
    font-size: 11.5px;
    color: var(--danger);
    margin-top: 8px;
    display:none;
  }
  .error.show{ display:block; }

  /* ---- Result ---- */
  .result{
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    background: var(--bg-card);
    box-shadow: 0 1px 2px rgba(20,20,30,0.03);
    position: sticky;
    top: 16px;
  }

  .result-empty{
    padding: 32px 16px;
    text-align:center;
    color: var(--text-faint);
    font-size: 12px;
    line-height:1.5;
  }
  .result-empty .icon{
    width:34px; height:34px;
    margin: 0 auto 10px;
    border-radius: 50%;
    background: var(--bg-card-2);
    border: 1px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    color: var(--text-faint);
    font-size: 15px;
  }
  .result.has-data .result-empty{ display:none; }
  .result-body{ display:none; }
  .result.has-data .result-body{ display:block; }

  .result-top{
    background: linear-gradient(135deg, rgba(232,53,46,0.08), rgba(232,53,46,0.01));
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }
  .result-label{
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .result-figure{
    font-family: var(--mono);
    font-size: 24px;
    font-weight: 700;
    line-height:1.1;
    letter-spacing:-0.01em;
    display:flex;
    align-items:baseline;
    gap:4px;
    flex-wrap: wrap;
  }
  .result-figure .cur{
    font-size: 15px;
    color: var(--text-muted);
    font-weight:500;
  }
  .result-figure.pos{ color: var(--success); }
  .result-figure.neg{ color: var(--danger); }

  .gauge{
    margin-top:12px;
    height:5px;
    background: var(--bg-card-2);
    border-radius: 4px;
    overflow:hidden;
    border:1px solid var(--border);
  }
  .gauge-fill{
    height:100%;
    width:0%;
    background: linear-gradient(90deg, var(--accent), var(--success));
    transition: width .6s cubic-bezier(.2,.8,.2,1);
    border-radius: 4px;
  }

  .result-grid{
    display:grid;
    grid-template-columns: 1fr;
  }
  .result-cell{
    padding: 10px 16px;
    border-bottom: 1px solid var(--border-soft);
  }
  .result-cell:last-child{ border-bottom:none; }
  .result-cell .k{
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 2px;
  }
  .result-cell .v{
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 600;
  }

  footer{
    margin-top: 16px;
    text-align:center;
    font-size: 11px;
    color: var(--text-faint);
  }
  footer a{ color: var(--accent); text-decoration:none; }

  /* ---- MOBİL VE DAR EKRAN UYUMLULUĞU ---- */
  @media (max-width: 480px){
    body { padding: 8px; }
    .layout{ grid-template-columns: 1fr; gap: 14px; } /* Mobilde zorunlu alt alta sıralama */
    .result{ position: static; }
    .card { padding: 14px; }
    .tabs { margin-bottom: 12px; }
    .tab { font-size: 10px; padding: 6px 2px; }
    input[type="text"], input[type="number"] { font-size: 14px; padding: 9px 10px; }
    .btn { font-size: 12.5px; padding: 10px 12px; }
  }

  @media (max-width: 350px){
    .tab { font-size: 9px; }
    .result-figure { font-size: 20px; }
  }
</style>
</head>
